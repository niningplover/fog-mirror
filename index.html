<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>Fog Mirror</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { background:#0a0a0a; height:100%; }
body {
  min-height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0a0a0a;
  font-family:Georgia,serif;
}

/* On a real phone this wrapper is invisible — fills screen */
/* On PC it simulates a phone viewport */
#phone-frame {
  position:relative;
  width:390px;
  height:844px;
  overflow:hidden;
  border-radius:44px;
  box-shadow:0 0 0 2px #222, 0 0 60px rgba(0,0,0,0.9);
  flex-shrink:0;
}

/* Full-screen on actual phone */
@media (max-width:500px) {
  body { display:block; background:#000; }
  #phone-frame {
    width:100vw;
    height:100dvh;
    border-radius:0;
    box-shadow:none;
  }
}

canvas {
  display:block;
  width:100% !important;
  height:100% !important;
  position:absolute;
  top:0; left:0;
}

/* Loading */
#loader {
  position:absolute;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:50;
  border-radius:inherit;
  transition:opacity 1.4s ease;
}
#loader.gone { opacity:0; pointer-events:none; }
#loader p {
  color:rgba(160,152,144,0.6);
  font-size:12px;
  letter-spacing:0.22em;
  line-height:2.4;
  text-align:center;
}
#dot {
  width:5px; height:5px; border-radius:50%;
  background:rgba(150,142,134,0.5);
  margin:18px auto 0;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100%{opacity:.2;transform:scale(1)}
  50%{opacity:.9;transform:scale(1.5)}
}

/* Debug / chat input — top right, outside phone frame */
#devtools {
  position:fixed;
  top:16px; right:16px;
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:100;
}
#devtools input {
  background:rgba(20,20,20,0.85);
  border:0.5px solid rgba(255,255,255,0.15);
  border-radius:8px;
  color:#ccc;
  font-size:12px;
  padding:6px 10px;
  width:200px;
  outline:none;
}
#devtools button {
  background:rgba(30,30,30,0.85);
  border:0.5px solid rgba(255,255,255,0.12);
  border-radius:8px;
  color:#aaa;
  font-size:11px;
  padding:5px 10px;
  cursor:pointer;
  text-align:left;
}
#devtools button:hover { background:rgba(50,50,50,0.9); }
#mic-status {
  font-size:10px;
  color:rgba(120,200,120,0.7);
  letter-spacing:0.1em;
  padding:4px 0;
}

/* TM cam hidden */
#tm-wrap { position:fixed; width:1px; height:1px; overflow:hidden; opacity:0; pointer-events:none; bottom:0; right:0; }
</style>
</head>
<body>

<div id="phone-frame">
  <div id="loader">
    <p>loading<br><span style="font-size:10px;opacity:.4;letter-spacing:.3em">please wait</span></p>
    <div id="dot"></div>
  </div>
</div>

<!-- Dev tools: only useful on PC, hidden on phone -->
<div id="devtools">
  <div id="mic-status">● mic: waiting</div>
  <input id="chat-input" type="text" placeholder="type to talk to her..." />
  <button onclick="testKey('t')">send: "can you hear me"</button>
  <button onclick="testKey('b')">blow fog (B)</button>
  <button onclick="testKey(' ')">shake (Space)</button>
  <button onclick="testKey('w')">wave (W)</button>
  <p style="font-size:10px;color:#444;padding:2px 0">hidden on phone</p>
</div>

<div id="tm-wrap"></div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
<script src="https://nkymut.github.io/p5.sensor/p5.sensor.js"></script>
<script src="sketch.js"></script>

<script>
// Mount p5 canvas inside phone frame, not body
window._p5Container = document.getElementById('phone-frame');

// Dismiss loader after p5 ready
window.addEventListener('load', ()=>{
  setTimeout(()=>{
    document.getElementById('loader').classList.add('gone');
  }, 2000);
});

// Prevent scroll/zoom
document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
document.addEventListener('gesturestart', e=>e.preventDefault());

// Dev panel helpers
function testKey(k) {
  // Simulate keypress for sketch.js
  window._testKey = k;
}

// Chat input
document.getElementById('chat-input').addEventListener('keydown', e=>{
  if (e.key==='Enter') {
    const v = e.target.value.trim();
    if (v && window.sendToAI) { window.sendToAI(v); e.target.value=''; }
  }
});

// Hide devtools on phone
if (window.innerWidth <= 500) {
  document.getElementById('devtools').style.display = 'none';
}

// Mic status updater (called from sketch)
window.setMicStatus = function(s) {
  document.getElementById('mic-status').textContent = '● mic: ' + s;
};
</script>
</body>
</html>
