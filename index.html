<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>Fog Mirror</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background:#000;
  overflow:hidden;
  /* NO touch-action:none here — that blocks the keyboard on iOS */
  font-family: Georgia, serif;
  color:#fff;
}

canvas {
  display:block;
  position:fixed;
  top:0; left:0;
  touch-action:none; /* only the canvas blocks default touch */
}

/* ── KEY SCREEN ─────────────────────────────────────────────── */
#keyscreen {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:200;
  padding:48px 32px;
  gap:20px;
  /* allow touch/scroll inside this div */
  touch-action:auto;
  overflow-y:auto;
}

#keyscreen h1 {
  font-size:17px;
  font-weight:400;
  letter-spacing:0.2em;
  color:rgba(200,192,182,0.82);
  text-align:center;
  margin-bottom:4px;
}

#keyscreen p {
  font-size:12px;
  color:rgba(140,132,122,0.65);
  text-align:center;
  line-height:2.0;
  letter-spacing:0.05em;
}

#keyscreen .divider {
  width:100%;
  height:0.5px;
  background:rgba(255,255,255,0.07);
}

#apiinput {
  width:100%;
  background:rgba(255,255,255,0.04);
  border:0.5px solid rgba(255,255,255,0.2);
  border-radius:12px;
  color:rgba(210,202,192,0.9);
  font-family:monospace;
  font-size:14px;
  padding:16px 16px;
  outline:none;
  letter-spacing:0.03em;
  text-align:center;
  /* critical: allow touch & keyboard on iOS */
  touch-action:auto;
  -webkit-user-select:text;
  user-select:text;
}
#apiinput::placeholder { color:rgba(150,142,132,0.35); letter-spacing:0.02em; }
#apiinput:focus { border-color:rgba(255,255,255,0.35); }

.btn-main {
  width:100%;
  background:rgba(255,255,255,0.05);
  border:0.5px solid rgba(255,255,255,0.2);
  border-radius:12px;
  color:rgba(200,192,182,0.85);
  font-family:Georgia,serif;
  font-size:14px;
  letter-spacing:0.15em;
  padding:17px 16px;
  cursor:pointer;
  -webkit-appearance:none;
  touch-action:auto;
}
.btn-main:active { background:rgba(255,255,255,0.11); }

.btn-skip {
  font-size:11px;
  color:rgba(110,104,96,0.55);
  letter-spacing:0.1em;
  cursor:pointer;
  text-decoration:underline;
  text-underline-offset:3px;
  background:none;
  border:none;
  padding:6px 0;
  font-family:Georgia,serif;
  -webkit-appearance:none;
  touch-action:auto;
}
.btn-skip:active { color:rgba(160,152,142,0.8); }

/* ── EXPERIENCE UI ──────────────────────────────────────────── */
#ui {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:10;
  display:none;
}

#subtitle {
  position:absolute;
  bottom:8%;
  left:0; right:0;
  text-align:center;
  font-size:15px;
  color:rgba(192,185,172,0);
  transition:color 0.7s ease;
  padding:0 28px;
  line-height:1.6;
  letter-spacing:0.04em;
}
#subtitle.show { color:rgba(192,185,172,0.90); }

#listendot {
  position:absolute;
  top:22px; right:20px;
  width:7px; height:7px;
  border-radius:50%;
  background:rgba(100,200,100,0);
  transition:background 0.3s;
}
#listendot.on { background:rgba(100,200,100,0.80); }
</style>
</head>
<body>

<!-- ── API KEY SCREEN ─────────────────────────────────────── -->
<div id="keyscreen">
  <h1>fog mirror</h1>
  <p>
    a communication from the third realm<br>
    enter your anthropic api key<br>
    to speak with what is inside
  </p>
  <div class="divider"></div>
  <input
    id="apiinput"
    type="text"
    inputmode="text"
    placeholder="sk-ant-..."
    autocomplete="off"
    autocorrect="off"
    autocapitalize="none"
    spellcheck="false"
  />
  <button class="btn-main" id="enterBtn">enter the glass</button>
  <button class="btn-skip" id="skipBtn">continue without key — demo mode</button>
</div>

<!-- ── EXPERIENCE OVERLAY ────────────────────────────────── -->
<div id="ui">
  <div id="subtitle"></div>
  <div id="listendot"></div>
</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
<script src="sketch.js"></script>

<script>
// Block scroll/zoom ONLY after launch (not on key screen)
let scrollBlocked = false;
document.addEventListener('touchmove', e => {
  if (scrollBlocked) e.preventDefault();
}, { passive: false });

// ── Launch ──────────────────────────────────────────────────
function launch(key) {
  window._apiKey = (key || '').trim();
  document.getElementById('keyscreen').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  scrollBlocked = true; // now block scroll on the canvas experience
  if (window._launchExperience) window._launchExperience();
}

document.getElementById('enterBtn').addEventListener('click', () => {
  launch(document.getElementById('apiinput').value);
});
document.getElementById('skipBtn').addEventListener('click', () => {
  launch('');
});
document.getElementById('apiinput').addEventListener('keydown', e => {
  if (e.key === 'Enter') launch(document.getElementById('apiinput').value);
});

// ── UI helpers called from sketch.js ───────────────────────
window.showSubtitle = function(text) {
  const el = document.getElementById('subtitle');
  el.classList.remove('show');
  void el.offsetWidth; // force reflow to restart transition
  el.textContent = text;
  el.classList.add('show');
};
window.hideSubtitle = function() {
  document.getElementById('subtitle').classList.remove('show');
};
window.setListenDot = function(on) {
  document.getElementById('listendot').classList.toggle('on', on);
};
</script>
</body>
</html>
